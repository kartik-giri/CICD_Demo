name: Deploy to EC2
# It is CD workflow which runs when push event is triggered

# On envent push request on main branch
on:
  push:
    branches:
      - main 

# Run this job. Job is deploy on EC2.
jobs:
  deploy:
    name: Push to EC2
    #Guthub runner VM uses ubuntu OS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        #clone the repo
        uses: actions/checkout@v2

      - name: executing remote ssh commands using key
        #DO SSH from runner VM to our EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 3.6.215.131 
          username: ubuntu
          key: ${{secrets.CD_SECRET_FOR_VM}}
          port: 22
          #Runs these commands on my EC2
          script: |
           export NVM_DIR="$HOME/.nvm"
           [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

           node -v
           npm -v

           cd ~/CICD_Demo
           git pull origin main
           npm install
           npm run build
           pm2 start all